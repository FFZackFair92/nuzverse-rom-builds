name: ROM Â· Arena (FORK)

# Sfida "Torre Lotta": builda la variant arena dal fork (NV_ARENA_ONLY=1).
# Squadra iniettata via gNvInjectParty (offset esportato nel sidecar -> inject_addr).

on:
  workflow_dispatch:
    inputs:
      fork_ref:
        description: "ref del fork (vuoto = nuzverse/main)"
        required: false
        default: ""
      lang:
        description: "lingua: en|it|es|fr|de|pt"
        required: false
        default: en
      deploy:
        description: "deploy in prod anche per lingua != en"
        required: false
        default: "false"

env:
  PRET_EMERALD_REF: master
  FORK_HOST: github.com/FFZackFair92/nuzverse-expansion.git

jobs:
  vanilla-emerald:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-vanilla
        with:
          game: emerald
          pret-ref: ${{ env.PRET_EMERALD_REF }}
      - uses: actions/upload-artifact@v4
        with:
          name: vanilla-emerald
          path: vanilla-emerald.gba
          if-no-files-found: error

  variant:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [vanilla-emerald]
    env:
      VARIANT: arena
      NV_FLAG: "-DNV_ARENA_ONLY=1"
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain moderna (expansion)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils-arm-none-eabi gcc-arm-none-eabi libpng-dev python3 git
      - name: Clona il branch del fork
        run: |
          REF="${{ inputs.fork_ref }}"
          [ -z "$REF" ] && REF="nuzverse/main"
          git clone --depth 1 --branch "$REF" \
            "https://x-access-token:${{ secrets.FORK_PAT }}@${FORK_HOST}" pex
      - name: Build variant
        run: |
          NV="$NV_FLAG"
          case "${{ inputs.lang }}" in
            it) NV="$NV -DNV_LANG=LANGUAGE_ITALIAN" ;;
            es) NV="$NV -DNV_LANG=LANGUAGE_SPANISH" ;;
            fr) NV="$NV -DNV_LANG=LANGUAGE_FRENCH" ;;
            de) NV="$NV -DNV_LANG=LANGUAGE_GERMAN" ;;
            pt) NV="$NV -DNV_LANG=NV_LANG_PORTUGUESE" ;;
            *) ;;
          esac
          TAG="$VARIANT"
          [ "${{ inputs.lang }}" != "en" ] && TAG="$VARIANT-${{ inputs.lang }}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          cd pex
          if [ "${{ inputs.lang }}" != "en" ]; then
            python3 tools/i18n/apply_translation.py "${{ inputs.lang }}" || true
          fi
          make -j"$(nproc)" NV_DEFINES="$NV" || make NV_DEFINES="$NV"
          cp pokeemerald.gba "../$VARIANT.gba"
      - name: Esporta offset dal .map (gNvInjectParty per iniezione mon)
        run: |
          cd pex
          : > ../seed-offset.txt
          for SYM in gNvInjectParty gIronmonFixedSeed gIronmonPoolCount gIronmonPool gParties gSaveBlock1Ptr; do
            OFF=$(grep -E "0x0[0-9a-fA-F]+ +${SYM}\b" pokeemerald.map | awk '{print $1}' | head -1)
            if [ -n "$OFF" ]; then echo "symbol=${SYM} addr=${OFF}" | tee -a ../seed-offset.txt; else echo "WARN ${SYM} non nel .map" | tee -a ../seed-offset.txt; fi
          done
      - uses: actions/download-artifact@v4
        with:
          name: vanilla-emerald
      - name: Genera BPS
        run: python3 decomp/ironmon-overlays/make_bps.py vanilla-emerald.gba arena.gba arena.bps
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TAG }}
          path: |
            arena.gba
            arena.bps
            seed-offset.txt
          if-no-files-found: error
      - name: Auto-deploy (bps + inject_addr)
        env:
          DEPLOY_URL: ${{ secrets.ROM_DEPLOY_URL }}
          DEPLOY_TOKEN: ${{ secrets.ROM_DEPLOY_TOKEN }}
        run: |
          if [ "${{ inputs.lang }}" != "en" ] && [ "${{ inputs.deploy }}" != "true" ]; then echo "skip deploy (lang test)"; exit 0; fi
          if [ -z "$DEPLOY_URL" ] || [ -z "$DEPLOY_TOKEN" ]; then echo "no deploy secrets -> artifact only"; exit 0; fi
          INJ=$(grep "symbol=gNvInjectParty " seed-offset.txt | grep -oE "0x0[0-9a-fA-F]+" | head -1)
          PARTIES=$(grep "symbol=gParties " seed-offset.txt | grep -oE "0x0[0-9a-fA-F]+" | head -1)
          SB1=$(grep "symbol=gSaveBlock1Ptr " seed-offset.txt | grep -oE "0x0[0-9a-fA-F]+" | head -1)
          echo "deploy arena (BPEE0): inject=$INJ parties=$PARTIES"
          curl -fsS -X POST "$DEPLOY_URL/api/rom/deploy" \
            -H "X-Deploy-Token: $DEPLOY_TOKEN" \
            -F "game_key=BPEE0" -F "variant=arena" -F "lang=${{ inputs.lang }}" \
            -F "patch=@arena.bps" \
            ${INJ:+-F "inject_addr=$INJ"} ${PARTIES:+-F "parties_addr=$PARTIES"} ${SB1:+-F "sb1ptr_addr=$SB1"}
          echo "auto-deploy OK"
